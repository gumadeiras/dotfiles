set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -sg escape-time 0
set -g mouse on
setw -g mode-keys vi
set -g history-limit 100000
set -g set-clipboard on
set -g allow-passthrough on
set -as terminal-features ',xterm*:clipboard'

# Scroll wheel enters tmux copy-mode for normal panes and scrolls there.
unbind-key -n WheelUpPane
unbind-key -n WheelDownPane
bind-key -n WheelUpPane if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "copy-mode -e"
bind-key -n WheelDownPane if-shell -F "#{||:#{alternate_on},#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "copy-mode -e"
bind -T copy-mode-vi WheelUpPane select-pane -t= \; send-keys -X -N 5 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane -t= \; send-keys -X -N 5 scroll-down
bind -T copy-mode WheelUpPane select-pane -t= \; send-keys -X -N 5 scroll-up
bind -T copy-mode WheelDownPane select-pane -t= \; send-keys -X -N 5 scroll-down

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi Enter send -X copy-selection-and-cancel
